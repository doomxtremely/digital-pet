name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip -d android-sdk
          mkdir -p android-sdk/cmdline-tools/latest
          mv android-sdk/cmdline-tools/bin android-sdk/cmdline-tools/latest/
          mv android-sdk/cmdline-tools/lib android-sdk/cmdline-tools/latest/
          mv android-sdk/cmdline-tools/source.properties android-sdk/cmdline-tools/latest/
          echo "ANDROID_HOME=$PWD/android-sdk" >> $GITHUB_ENV
          echo "PATH=$PWD/android-sdk/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV
          yes | $PWD/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $PWD/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Configure Gradle mirrors
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              buildscript {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/central' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                      google()
                      mavenCentral()
                  }
              }
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk