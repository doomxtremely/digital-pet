name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List available Android SDK
        run: |
          ls -la /usr/local/lib/android/sdk/ || true
          ls -la /opt/android-sdk/ || true
          which sdkmanager || true

      - name: Install Android SDK using apt
        run: |
          sudo apt-get update
          sudo apt-get install -y android-sdk

      - name: Find SDK location
        run: |
          find / -name "sdkmanager" 2>/dev/null | head -5

      - name: Configure environment
        run: |
          export ANDROID_HOME=/usr/lib/android-sdk
          export PATH=$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$PATH
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install required components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure Gradle mirrors
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              buildscript {
                  repositories {
                      maven { url 'https://maven.aliyun.com/repository/google' }
                      maven { url 'https://maven.aliyun.com/repository/central' }
                      maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                      google()
                      mavenCentral()
                  }
              }
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/central' }
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk